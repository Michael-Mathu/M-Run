name: mwendo_app
description: "Mwendo running tracker"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.2.0
  maplibre_gl: ^0.26.2
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  dio: ^5.4.0
  web_socket_channel: ^3.0.3
  fl_chart: ^1.2.0
  flutter_local_notifications: ^22.0.1
  url_launcher: ^6.2.5
  share_plus: ^13.2.0
  xml: ^7.0.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  confetti: ^0.8.0
  shared_preferences: ^2.3.2
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  sqlite3: ^3.0.0
  mwendo_gps_engine:
    path: ../packages/mwendo_gps_engine
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.20.0
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpeg