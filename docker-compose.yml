services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: mwendo
      POSTGRES_PASSWORD: mwendo
      POSTGRES_DB: mwendo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mwendo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://mwendo:mwendo@db:5432/mwendo?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "change-me-in-production"
      ENV: "dev"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy